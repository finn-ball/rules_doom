name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag being released
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.2.2
    with:
      release_files: rules_doom-v*.tar.gz
      prerelease: false
      draft: true
      tag_name: ${{ inputs.tag_name || github.ref_name }}

  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}

  finalize:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name || github.ref_name }}
