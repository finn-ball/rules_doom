name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.bazel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        bazel:
          - 8.x
          - 9.x
          - rolling

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build all targets
        run: bazel --batch build --verbose_failures //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-macos
          external-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build all targets
        run: bazel --batch build --verbose_failures //...
        env:
          USE_BAZEL_VERSION: 9.x

  gate:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - build
      - build-macos
    if: ${{ always() }}
    steps:
      - name: Verify dependencies passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.build-macos.result }}" != "success" ]; then
            echo "macOS build failed: ${{ needs.build-macos.result }}"
            exit 1
          fi
          echo "All CI checks passed."
